name: CI

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  lint-typecheck-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: judgeloom
          POSTGRES_USER: judgeloom
          POSTGRES_PASSWORD: judgeloom
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U judgeloom -d judgeloom"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      DJANGO_SETTINGS_MODULE: config.settings.testing
      DJANGO_SECRET_KEY: ci-secret-key
      DATABASE_URL: postgres://judgeloom:judgeloom@localhost:5432/judgeloom
      REDIS_URL: redis://localhost:6379/0
      CELERY_BROKER_URL: redis://localhost:6379/1
      CHANNEL_LAYERS_URL: redis://localhost:6379/2

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            requirements/base.txt
            requirements/testing.txt
            requirements/development.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements/development.txt

      - name: Run lint
        run: make lint

      - name: Run type check
        run: make typecheck

      - name: Run tests
        run: python -m pytest tests/ -q
