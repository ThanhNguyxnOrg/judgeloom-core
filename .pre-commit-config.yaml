# =============================================================================
# JudgeLoom — Pre-commit Configuration
# =============================================================================
# Install hooks:  pre-commit install
# Run manually:   pre-commit run --all-files
# Update repos:   pre-commit autoupdate
# =============================================================================

default_language_version:
  python: python3.12

default_stages: [pre-commit]

repos:

  # ─── General file hygiene ────────────────────────────────────────────────

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-yaml
        name: Validate YAML syntax
      - id: check-toml
        name: Validate TOML syntax
      - id: check-json
        name: Validate JSON syntax
      - id: end-of-file-fixer
        name: Ensure files end with a newline
      - id: trailing-whitespace
        name: Trim trailing whitespace
        args: [--markdown-linebreak-ext=md]
      - id: check-added-large-files
        name: Block large file commits
        args: [--maxkb=500]
      - id: check-merge-conflict
        name: Detect merge conflict markers
      - id: check-case-conflict
        name: Detect case-insensitive filename conflicts
      - id: mixed-line-ending
        name: Normalise line endings
        args: [--fix=lf]
      - id: detect-private-key
        name: Detect accidentally committed private keys

  # ─── Python linting & formatting (ruff) ──────────────────────────────────

  - repo: https://github.com/astral-sh/ruff-pre-commit
    # Keep in sync with the ruff version in requirements/development.txt
    rev: v0.9.10
    hooks:
      - id: ruff
        name: ruff — lint
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format
        name: ruff — format

  # ─── Static type checking (mypy) ─────────────────────────────────────────

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.14.1
    hooks:
      - id: mypy
        name: mypy — type check
        # Pass additional type stub packages so mypy can resolve them
        additional_dependencies:
          - django-stubs>=5.1,<6.0
          - celery-types>=0.22,<1.0
          - types-Markdown
          - types-bleach
          - types-Pillow
          - types-python-dateutil
        args: [--config-file=pyproject.toml]

  # ─── Django-specific upgrades ─────────────────────────────────────────────

  - repo: https://github.com/adamchainz/django-upgrade
    rev: 1.22.2
    hooks:
      - id: django-upgrade
        name: django-upgrade — modernise Django syntax
        args: [--target-version, "5.1"]
